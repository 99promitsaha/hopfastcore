<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFBFC"/>
      <stop offset="100%" stop-color="#F3F5FA"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A7CA"/>
      <stop offset="100%" stop-color="#96D2F4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- bunny icon -->
  <g transform="translate(540, 120)">
    <rect width="120" height="120" rx="30" fill="url(#brand)"/>
    <g fill="white">
      <rect x="36" y="8" width="15" height="48" rx="7.5"/>
      <rect x="69" y="8" width="15" height="48" rx="7.5"/>
      <circle cx="60" cy="79" r="32"/>
    </g>
  </g>

  <!-- title -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="72" fill="#32435E" text-anchor="middle" letter-spacing="-2">HopFast</text>

  <!-- subtitle -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="28" fill="rgba(50,67,94,0.55)" text-anchor="middle">Cross-chain swap and yield aggregator</text>

  <!-- chain pills -->
  <g transform="translate(280, 400)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="rgba(50,67,94,0.06)" stroke="rgba(50,67,94,0.08)" stroke-width="1"/>
    <text x="60" y="26" font-family="system-ui, sans-serif" font-weight="600" font-size="15" fill="rgba(50,67,94,0.5)" text-anchor="middle">Ethereum</text>

    <rect x="135" y="0" width="80" height="40" rx="20" fill="rgba(50,67,94,0.06)" stroke="rgba(50,67,94,0.08)" stroke-width="1"/>
    <text x="175" y="26" font-family="system-ui, sans-serif" font-weight="600" font-size="15" fill="rgba(50,67,94,0.5)" text-anchor="middle">Base</text>

    <rect x="230" y="0" width="80" height="40" rx="20" fill="rgba(50,67,94,0.06)" stroke="rgba(50,67,94,0.08)" stroke-width="1"/>
    <text x="270" y="26" font-family="system-ui, sans-serif" font-weight="600" font-size="15" fill="rgba(50,67,94,0.5)" text-anchor="middle">BNB</text>

    <rect x="325" y="0" width="105" height="40" rx="20" fill="rgba(50,67,94,0.06)" stroke="rgba(50,67,94,0.08)" stroke-width="1"/>
    <text x="377" y="26" font-family="system-ui, sans-serif" font-weight="600" font-size="15" fill="rgba(50,67,94,0.5)" text-anchor="middle">Polygon</text>

    <rect x="445" y="0" width="100" height="40" rx="20" fill="rgba(50,67,94,0.06)" stroke="rgba(50,67,94,0.08)" stroke-width="1"/>
    <text x="495" y="26" font-family="system-ui, sans-serif" font-weight="600" font-size="15" fill="rgba(50,67,94,0.5)" text-anchor="middle">Monad</text>
  </g>

  <!-- bottom tagline -->
  <text x="600" y="520" font-family="system-ui, sans-serif" font-weight="600" font-size="18" fill="rgba(50,67,94,0.35)" text-anchor="middle">For humans and AI agents</text>

  <!-- URL -->
  <text x="600" y="560" font-family="monospace" font-weight="600" font-size="16" fill="rgba(50,67,94,0.3)" text-anchor="middle">hopfast.xyz</text>
</svg>
